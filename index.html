<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Editor</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #videoContainer { display: flex; flex-direction: column; align-items: center; }
        video { width: 640px; height: 360px; }
    </style>
</head>
<body>
    <div id="videoContainer">
        <video id="videoPlayer" controls>
            <source id="videoSource" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <input type="file" id="videoUpload" accept="video/mp4">
        <div>
            <button onclick="playVideo()">Play</button>
            <button onclick="pauseVideo()">Pause</button>
            <button onclick="stopVideo()">Stop</button>
            <button onclick="rewindVideo()">Rewind</button>
            <button onclick="forwardVideo()">Forward</button>
        </div>
        <div>
            <label for="volumeControl">Volume:</label>
            <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="1" onchange="changeVolume(this.value)">
        </div>
        <div>
            <label for="speedControl">Speed:</label>
            <input type="range" id="speedControl" min="0.5" max="2" step="0.1" value="1" onchange="changeSpeed(this.value)">
        </div>
        <div>
            <input type="range" id="timelineScrubber" value="0" onchange="scrubVideo(this.value)">
        </div>
    </div>
    <script>
        const videoPlayer = document.getElementById('videoPlayer');
        const videoUpload = document.getElementById('videoUpload');
        const timelineScrubber = document.getElementById('timelineScrubber');

        videoUpload.addEventListener('change', function() {
            const file = this.files[0];
            const fileURL = URL.createObjectURL(file);
            videoPlayer.src = fileURL;
            videoPlayer.load();
        });

        function playVideo() { videoPlayer.play(); }
        function pauseVideo() { videoPlayer.pause(); }
        function stopVideo() { videoPlayer.pause(); videoPlayer.currentTime = 0; }
        function rewindVideo() { videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 5); }
        function forwardVideo() { videoPlayer.currentTime += 5; }
        function changeVolume(value) { videoPlayer.volume = value; }
        function changeSpeed(value) { videoPlayer.playbackRate = value; }
        videoPlayer.addEventListener('timeupdate', function() {
            const value = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            timelineScrubber.value = value;
        });
        function scrubVideo(value) {
            const time = (value / 100) * videoPlayer.duration;
            videoPlayer.currentTime = time;
        }
    </script>
</body>
</html>
